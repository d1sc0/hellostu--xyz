<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <title>Preview Image</title>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
 <style>
  body {
   margin: 0;
   font-family: 'Inter', 'Bungee', 'Impact', 'Arial Black', sans-serif;
   position: relative;
   overflow: hidden;
  }

  .container {
   width: 600px;
   height: 600px;
   position: relative;
   /* fallback background for manual preview */
   background: url('preview-background.png') no-repeat center center;
   background-size: cover;
  }

  .preview-bg {
   filter: opacity(0.5);
   position: absolute;
   width: 100%;
   height: 100%;
   object-fit: cover;
   z-index: 0;
  }

  .site-title {
   position: absolute;
   width: 600px;
   text-align: center;
   top: 110px;
   font-family: 'Inter', sans-serif;
   font-size: 2.0rem;
   background-color: white;
   color: #2b2b2b;
   text-transform: uppercase;
   font-weight: 700;
   letter-spacing: 1px;
  }

  .site-url {
   position: absolute;
   width: 600px;
   bottom: 102px;
   font-family: 'Helvetica Neue', sans-serif;
   font-size: 1.1rem;
   background-color: white;
   color: #2b2b2b;
   font-weight: 400;
   text-transform: uppercase;
   text-align: center;
   letter-spacing: 1px;
  }

  /* .episode-number styles removed */

  .title {
   position: absolute;
   width: 600px;
   text-align: center;
   top: 230px;
   font-family: 'Inter', sans-serif;
   font-size: 4.5rem;
   background-color: white;
   color: #2b2b2b;
   font-weight: 700;
   text-transform: uppercase;
   line-height: 1.1;
   word-break: break-word;
  }
 </style>
</head>

<body>
 <div class="container">
  <div class="site-title" id="site-title">%%SITE_TITLE%%</div>
  <!-- episode number removed -->
  <div class="title" id="title">%%TITLE%%</div>
  <div class="site-url" id="site-url">%%SITE_URL%%</div>
 </div>
</body>

</html>
