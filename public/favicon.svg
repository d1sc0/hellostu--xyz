<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

 <!-- Circle -->
 <circle cx="256" cy="256" r="248"
  fill="#4f83c2"
  stroke="#e6e2d6"
  stroke-width="12" />

 <!-- H constructed from stroked paths -->
 <g stroke="#000000" stroke-width="70" stroke-linecap="round" fill="none">

  <!-- Left vertical -->
  <path d="M180 160 L180 360" />

  <!-- Right vertical (slightly tilted) -->
  <path d="M310 140 L350 370" />

  <!-- Crossbar -->
  <path d="M150 250 L370 240" />

  <!-- Slight lower support curve (matches bulge in original) -->
  <path d="M200 260 L280 255" />

 </g>

</svg>